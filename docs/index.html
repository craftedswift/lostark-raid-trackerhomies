<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Raid clear tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'https://rbgehebmevjiwhoupmib.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJiZ2VoZWJtZXZqaXdob3VwbWliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMTM0NDcsImV4cCI6MjA5ODY4OTQ0N30.BRP1hyhLlL-7B59g-ODyeOQ2Xtq2TTtI0PJg6ZXQeBE';

  // Keep in sync with src/raidMapping.js on the backend.
  const TRACKED_RAIDS = ['Serca', 'Horizon Cathedral', 'Kazeros', 'Mochi'];
  // The 3 current raids that still award weekly gold. Mochi is older content
  // people sometimes clear to help newer players without taking gold, so it
  // shouldn't count toward "done for the week" on its own.
  const GOLD_RAIDS = ['Serca', 'Horizon Cathedral', 'Kazeros'];
  const VISIBLE_ROWS = 6;

  // Item level gates per difficulty, highest first so the first match wins.
  // Update these if a balance patch shifts the requirements.
  const RAID_DIFFICULTY_TIERS = {
    Serca: [
      { name: 'Nightmare', itemLevel: 1740 },
      { name: 'Hard', itemLevel: 1730 },
      { name: 'Normal', itemLevel: 1710 },
    ],
    'Horizon Cathedral': [
      { name: 'Level 3', itemLevel: 1750 },
      { name: 'Level 2', itemLevel: 1720 },
      { name: 'Level 1', itemLevel: 1700 },
    ],
    Kazeros: [
      { name: 'Hard', itemLevel: 1730 },
      { name: 'Normal', itemLevel: 1710 },
    ],
    Mochi: [
      { name: 'Hard', itemLevel: 1720 },
      { name: 'Normal', itemLevel: 1700 },
    ],
  };

  function getEligibleDifficulty(raidName, itemLevel) {
    const tiers = RAID_DIFFICULTY_TIERS[raidName];
    if (!tiers || itemLevel == null) return null;
    for (const tier of tiers) {
      if (itemLevel >= tier.itemLevel) return tier.name;
    }
    return null;
  }

  // Raid splash art, sourced the same way as the class icons — rotates on
  // every load so the backdrop isn't the same raid every time. Echidna is a
  // low-res official promo image (not full-bleed splash art like the rest),
  // so it's weighted to show up rarely as a bit of a rare pull.
  const BANNER_IMAGES = [
    { file: 'thaemine.webp', weight: 1 },
    { file: 'feiton.webp', weight: 1 },
    { file: 'rimeria.webp', weight: 1 },
    { file: 'voldis.webp', weight: 1 },
    { file: 'skurzan.webp', weight: 1 },
    { file: 'legion.webp', weight: 1 },
    { file: 'echidna.jpg', weight: 0.08 },
  ];

  function pickWeightedBanner() {
    const totalWeight = BANNER_IMAGES.reduce((sum, entry) => sum + entry.weight, 0);
    let roll = Math.random() * totalWeight;
    for (const entry of BANNER_IMAGES) {
      roll -= entry.weight;
      if (roll <= 0) return entry.file;
    }
    return BANNER_IMAGES[0].file;
  }

  function setRandomBanner() {
    document.getElementById('bg-banner').src = `assets/banners/${pickWeightedBanner()}`;
  }
  setRandomBanner();

  const RESET_ZONE = 'America/New_York';
  const RESET_WEEKDAY = 3;
  const RESET_HOUR = 3;

  function getCurrentWeekStart() {
    const { DateTime } = luxon;
    const nowInZone = DateTime.now().setZone(RESET_ZONE);
    const daysSinceReset = (nowInZone.weekday - RESET_WEEKDAY + 7) % 7;
    let boundary = nowInZone
      .minus({ days: daysSinceReset })
      .set({ hour: RESET_HOUR, minute: 0, second: 0, millisecond: 0 });
    if (boundary > nowInZone) boundary = boundary.minus({ weeks: 1 });
    return boundary;
  }

  window.handleIconError = function (img) {
    if (img.dataset.fallbackSrc) {
      img.src = img.dataset.fallbackSrc;
      delete img.dataset.fallbackSrc;
      return;
    }
    const span = document.createElement('span');
    span.className = 'avatar avatar-fallback';
    span.textContent = img.dataset.fallbackText || '??';
    img.replaceWith(span);
  };

  function classIconHtml(className) {
    if (!className) {
      return '<span class="avatar avatar-fallback">??</span>';
    }
    const safeName = className.replace(/[^a-zA-Z0-9_ -]/g, '');
    const fallback = safeName.slice(0, 2);
    return `<img class="avatar avatar-icon" src="assets/classes/${safeName}.svg" data-fallback-src="assets/classes/${safeName}.png" data-fallback-text="${fallback}" alt="${safeName}" onerror="handleIconError(this)" />`;
  }

  let cachedData = null;
  let hideThreeOfFour = true;
  let searchTerm = '';
  let raidFilter = null; // { raidName, mode: 'needs' | 'has' } or null
  const minimizedPeople = new Set();

  const FAVORITES_KEY = 'lostark-tracker-favorites';

  function loadFavorites() {
    try {
      const raw = localStorage.getItem(FAVORITES_KEY);
      return new Set(raw ? JSON.parse(raw) : []);
    } catch {
      return new Set();
    }
  }

  function saveFavorites(favorites) {
    localStorage.setItem(FAVORITES_KEY, JSON.stringify([...favorites]));
  }

  const favoritePeople = loadFavorites();

  const EYE_SVG = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  const EYE_OFF_SVG = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.8 21.8 0 0 1 5.06-6.06M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.79 21.79 0 0 1-3.22 4.55M1 1l22 22"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/></svg>';
  const CHEVRON_SVG = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
  const STAR_OUTLINE_SVG = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
  const STAR_FILLED_SVG = '<svg viewBox="0 0 24 24" width="16" height="16" fill="#d8a34a" stroke="#d8a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';

  function buildCharRow(char, raidsCleared) {
    const rowEl = document.createElement('div');
    rowEl.className = 'char-row';

    const nameEl = document.createElement('div');
    nameEl.className = 'char-name';
    nameEl.innerHTML = `
      ${classIconHtml(char.class_name)}
      <span class="name">${char.char_name}</span>
      <span class="ilvl">${char.item_level != null ? char.item_level.toFixed(2) : '?'}</span>
      <span class="region">NA</span>
      <span class="muted">${char.class_name || 'unknown class'}</span>
      <span class="muted">${raidsCleared.size}/${TRACKED_RAIDS.length} cleared</span>
    `;
    rowEl.appendChild(nameEl);

    const badgesEl = document.createElement('div');
    badgesEl.className = 'badges';
    const remainingRaids = TRACKED_RAIDS.filter((raidName) => !raidsCleared.has(raidName));
    if (remainingRaids.length === 0) {
      const badge = document.createElement('span');
      badge.className = 'badge badge-all-done';
      badge.textContent = 'All raids cleared';
      badgesEl.appendChild(badge);
    } else {
      for (const raidName of remainingRaids) {
        const badge = document.createElement('span');
        badge.className = 'badge badge-todo';
        badge.textContent = raidName;
        badgesEl.appendChild(badge);
      }
    }
    rowEl.appendChild(badgesEl);

    return rowEl;
  }

  function isFullyComplete(raidsCleared) {
    return TRACKED_RAIDS.every((raidName) => raidsCleared.has(raidName));
  }

  function hasFinishedGoldRaids(raidsCleared) {
    return GOLD_RAIDS.every((raidName) => raidsCleared.has(raidName));
  }

  function isCompletionHidden(raidsCleared) {
    if (isFullyComplete(raidsCleared)) return true; // all 4 raids — always hidden
    if (hasFinishedGoldRaids(raidsCleared) && hideThreeOfFour) return true; // gold raids done, Mochi optional — toggle-controlled
    return false;
  }

  function renderRosterCard(root, personName, chars, visibleChars, clearsByCharId, { showHiddenCount }) {
    const rosterEl = document.createElement('div');
    rosterEl.className = 'roster';

    let countsText = `${chars.length} chars`;
    if (showHiddenCount) {
      let hiddenCount = 0;
      let completeCount = 0;
      for (const char of chars) {
        const raidsCleared = clearsByCharId.get(char.id) || new Set();
        if (isFullyComplete(raidsCleared)) completeCount++;
        else if (hasFinishedGoldRaids(raidsCleared) && hideThreeOfFour) hiddenCount++;
      }
      if (hiddenCount > 0) countsText += `, ${hiddenCount} hidden`;
      if (completeCount > 0) countsText += `, ${completeCount} complete`;
    }
    const isMinimized = showHiddenCount && minimizedPeople.has(personName);

    const headerEl = document.createElement('div');
    headerEl.className = 'roster-header';
    headerEl.innerHTML = `
      <div class="roster-header-text">
        <span>${personName}'s roster</span>
        <span class="muted">(${countsText})</span>
      </div>
    `;

    if (showHiddenCount) {
      const actionsEl = document.createElement('div');
      actionsEl.className = 'roster-header-actions';

      const isFavorited = favoritePeople.has(personName);
      const favoriteBtn = document.createElement('button');
      favoriteBtn.className = 'favorite-btn';
      const favoriteLabel = isFavorited ? 'Unfavorite roster' : 'Favorite roster';
      favoriteBtn.title = favoriteLabel;
      favoriteBtn.setAttribute('aria-label', favoriteLabel);
      favoriteBtn.innerHTML = isFavorited ? STAR_FILLED_SVG : STAR_OUTLINE_SVG;
      favoriteBtn.addEventListener('click', () => {
        if (favoritePeople.has(personName)) favoritePeople.delete(personName);
        else favoritePeople.add(personName);
        saveFavorites(favoritePeople);
        renderDashboard();
      });
      actionsEl.appendChild(favoriteBtn);

      const minimizeBtn = document.createElement('button');
      minimizeBtn.className = 'minimize-btn' + (isMinimized ? ' collapsed' : '');
      const label = isMinimized ? 'Expand roster' : 'Minimize roster';
      minimizeBtn.title = label;
      minimizeBtn.setAttribute('aria-label', label);
      minimizeBtn.innerHTML = CHEVRON_SVG;
      minimizeBtn.addEventListener('click', () => {
        if (minimizedPeople.has(personName)) minimizedPeople.delete(personName);
        else minimizedPeople.add(personName);
        renderDashboard();
      });
      actionsEl.appendChild(minimizeBtn);

      headerEl.appendChild(actionsEl);
    }

    rosterEl.appendChild(headerEl);
    root.appendChild(rosterEl);

    if (isMinimized) return;

    const bodyEl = document.createElement('div');
    bodyEl.className = 'roster-body';

    for (const char of visibleChars) {
      const raidsCleared = clearsByCharId.get(char.id) || new Set();
      bodyEl.appendChild(buildCharRow(char, raidsCleared));
    }

    rosterEl.appendChild(bodyEl);

    if (visibleChars.length > VISIBLE_ROWS) {
      const rows = bodyEl.querySelectorAll('.char-row');
      const cutoffRow = rows[VISIBLE_ROWS - 1];
      const visibleHeight = cutoffRow.offsetTop - rows[0].offsetTop + cutoffRow.offsetHeight;
      bodyEl.style.maxHeight = `${visibleHeight}px`;
      bodyEl.style.overflowY = 'auto';
    }
  }

  // Nests a list of characters under their roster owner, so a long flat list
  // of names becomes scannable by which roster they belong to.
  function renderOwnerGroupsHtml(chars) {
    const byOwner = new Map();
    for (const char of chars) {
      if (!byOwner.has(char.person_name)) byOwner.set(char.person_name, []);
      byOwner.get(char.person_name).push(char);
    }

    let html = '';
    for (const [owner, ownerChars] of byOwner) {
      const chips = ownerChars.map((c) => `<span class="raid-summary-chip">${c.char_name}</span>`).join('');
      html += `
        <div class="raid-summary-owner">
          <span class="raid-summary-owner-name">${owner}</span>
          <div class="raid-summary-names">${chips}</div>
        </div>
      `;
    }
    return html;
  }

  function renderRaidSummary(raidName, mode, chars) {
    const box = document.getElementById('raid-summary');

    if (!raidName) {
      box.innerHTML = '';
      box.classList.remove('visible');
      return;
    }

    box.classList.add('visible');

    if (chars.length === 0) {
      const verb = mode === 'needs' ? 'needs' : 'has cleared';
      box.innerHTML = `<span class="muted">Nobody ${verb} ${raidName} right now.</span>`;
      return;
    }

    if (mode === 'has') {
      box.innerHTML = `
        <span class="raid-summary-label">${chars.length} ${chars.length === 1 ? 'character has' : 'characters have'} cleared ${raidName}:</span>
        ${renderOwnerGroupsHtml(chars)}
      `;
      return;
    }

    // mode === 'needs' — group by the difficulty each character's item level
    // currently qualifies them for, so it's clear who can actually run what.
    const tiers = RAID_DIFFICULTY_TIERS[raidName] || [];
    const groups = new Map(); // tier name -> chars[]
    const notEligible = [];

    for (const char of chars) {
      const tier = getEligibleDifficulty(raidName, char.item_level);
      if (!tier) {
        notEligible.push(char);
        continue;
      }
      if (!groups.has(tier)) groups.set(tier, []);
      groups.get(tier).push(char);
    }

    let html = `<span class="raid-summary-label">${chars.length} ${chars.length === 1 ? 'character needs' : 'characters need'} ${raidName}:</span>`;

    for (const tier of tiers) {
      const group = groups.get(tier.name);
      if (!group || group.length === 0) continue;
      html += `
        <div class="raid-summary-group">
          <span class="raid-summary-tier">${tier.name}-eligible (${group.length}):</span>
          ${renderOwnerGroupsHtml(group)}
        </div>
      `;
    }

    if (notEligible.length > 0) {
      html += `
        <div class="raid-summary-group">
          <span class="raid-summary-tier">Not yet eligible (${notEligible.length}):</span>
          ${renderOwnerGroupsHtml(notEligible)}
        </div>
      `;
    }

    box.innerHTML = html;
  }

  function renderDashboard() {
    const root = document.getElementById('root');
    if (!cachedData) return;
    const { byPerson, clearsByCharId } = cachedData;

    root.innerHTML = '';

    if (byPerson.size === 0) {
      root.innerHTML = '<p class="muted">No resolved characters yet.</p>';
      return;
    }

    const personEntries = [...byPerson].sort(
      (a, b) => Number(favoritePeople.has(b[0])) - Number(favoritePeople.has(a[0]))
    );

    if (raidFilter) {
      const { raidName, mode } = raidFilter;
      let renderedAnyone = false;
      const summaryChars = [];

      for (const [personName, chars] of personEntries) {
        const matchingChars = chars.filter((char) => {
          const cleared = clearsByCharId.get(char.id) || new Set();
          const hasRaid = cleared.has(raidName);
          return mode === 'needs' ? !hasRaid : hasRaid;
        });
        if (matchingChars.length === 0) continue;

        renderedAnyone = true;
        summaryChars.push(...matchingChars);
        renderRosterCard(root, personName, matchingChars, matchingChars, clearsByCharId, { showHiddenCount: false });
      }

      renderRaidSummary(raidName, mode, summaryChars);

      if (!renderedAnyone) {
        const verb = mode === 'needs' ? 'needs' : 'has cleared';
        root.innerHTML = `<p class="muted">Nobody ${verb} ${raidName} right now.</p>`;
      }
      return;
    }

    renderRaidSummary(null);

    const term = searchTerm.trim().toLowerCase();
    let renderedAnything = false;

    for (const [personName, chars] of personEntries) {
      const personMatches = !term || personName.toLowerCase().includes(term);

      if (personMatches) {
        const visibleChars = chars.filter((char) => !isCompletionHidden(clearsByCharId.get(char.id) || new Set()));
        renderedAnything = true;
        renderRosterCard(root, personName, chars, visibleChars, clearsByCharId, { showHiddenCount: true });
        continue;
      }

      // Person name didn't match — fall back to matching individual character names.
      // Explicit character search always shows the result, ignoring the completion toggle.
      const matchingChars = chars.filter((char) => char.char_name.toLowerCase().includes(term));
      if (matchingChars.length === 0) continue;

      renderedAnything = true;
      renderRosterCard(root, personName, matchingChars, matchingChars, clearsByCharId, { showHiddenCount: false });
    }

    if (!renderedAnything) {
      root.innerHTML = '<p class="muted">No matches.</p>';
    }
  }

  async function main() {
    const root = document.getElementById('root');

    if (SUPABASE_ANON_KEY.startsWith('PASTE_')) {
      root.innerHTML = '<p class="error">Set SUPABASE_ANON_KEY in index.html before loading this page.</p>';
      return;
    }

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const weekStart = getCurrentWeekStart();
    const weekStartDate = weekStart.toISODate();

    document.getElementById('week-label').textContent = `week of ${weekStartDate}`;

    const [{ data: characters, error: charErr }, { data: clears, error: clearErr }] = await Promise.all([
      supabase.from('characters').select('id, person_name, char_name, class_name, item_level').eq('resolve_status', 'ok'),
      supabase.from('clears').select('character_id, raid_name').eq('week_start', weekStartDate),
    ]);

    if (charErr || clearErr) {
      root.innerHTML = `<p class="error">Failed to load data: ${(charErr || clearErr).message}</p>`;
      return;
    }

    const clearsByCharId = new Map();
    for (const clear of clears) {
      if (!clearsByCharId.has(clear.character_id)) clearsByCharId.set(clear.character_id, new Set());
      clearsByCharId.get(clear.character_id).add(clear.raid_name);
    }

    const byPerson = new Map();
    for (const char of characters) {
      if (!byPerson.has(char.person_name)) byPerson.set(char.person_name, []);
      byPerson.get(char.person_name).push(char);
    }
    for (const chars of byPerson.values()) {
      chars.sort((a, b) => (b.item_level ?? 0) - (a.item_level ?? 0));
    }

    cachedData = { byPerson, clearsByCharId };
    renderDashboard();
  }

  function setupControls() {
    const toggleBtn = document.getElementById('hide-toggle');
    const searchInput = document.getElementById('search-input');
    const raidFilterBar = document.getElementById('raid-filter-bar');

    function updateToggleLabel() {
      const label = hideThreeOfFour ? 'Show 3/4 cleared characters' : 'Hide 3/4 cleared characters';
      toggleBtn.innerHTML = hideThreeOfFour ? EYE_OFF_SVG : EYE_SVG;
      toggleBtn.title = label;
      toggleBtn.setAttribute('aria-label', label);
    }

    function renderRaidChips() {
      raidFilterBar.innerHTML = '';
      for (const raidName of TRACKED_RAIDS) {
        const chip = document.createElement('button');
        chip.className = 'raid-chip';
        chip.textContent = raidName;

        if (raidFilter && raidFilter.raidName === raidName) {
          chip.classList.add(raidFilter.mode === 'needs' ? 'mode-needs' : 'mode-has');
          chip.title = raidFilter.mode === 'needs' ? `Showing who needs ${raidName} — click to show who has it` : `Showing who has ${raidName} — click to clear`;
        } else {
          chip.title = `Click to show who still needs ${raidName}`;
        }

        chip.addEventListener('click', () => {
          if (raidFilter && raidFilter.raidName === raidName) {
            raidFilter = raidFilter.mode === 'needs' ? { raidName, mode: 'has' } : null;
          } else {
            raidFilter = { raidName, mode: 'needs' };
          }
          searchTerm = '';
          searchInput.value = '';
          renderRaidChips();
          renderDashboard();
        });

        raidFilterBar.appendChild(chip);
      }
    }

    updateToggleLabel();
    renderRaidChips();

    toggleBtn.addEventListener('click', () => {
      hideThreeOfFour = !hideThreeOfFour;
      updateToggleLabel();
      renderDashboard();
    });

    searchInput.addEventListener('input', () => {
      searchTerm = searchInput.value;
      if (searchTerm.trim() && raidFilter) {
        raidFilter = null;
        renderRaidChips();
      }
      renderDashboard();
    });
  }

  main();
  setupControls();
</script>
<style>

    color-scheme: dark;

    position: fixed;
    top: 0;
