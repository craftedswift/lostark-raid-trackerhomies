<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Raid clear tracker</title>
<script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'https://rbgehebmevjiwhoupmib.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJiZ2VoZWJtZXZqaXdob3VwbWliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMTM0NDcsImV4cCI6MjA5ODY4OTQ0N30.BRP1hyhLlL-7B59g-ODyeOQ2Xtq2TTtI0PJg6ZXQeBE';

  // Keep in sync with src/raidMapping.js on the backend.
  const TRACKED_RAIDS = ['Serca', 'Horizon Cathedral', 'Kazeros', 'Mochi'];
  const VISIBLE_ROWS = 6;

  const RESET_ZONE = 'America/New_York';
  const RESET_WEEKDAY = 3;
  const RESET_HOUR = 3;

  function getCurrentWeekStart() {
    const { DateTime } = luxon;
    const nowInZone = DateTime.now().setZone(RESET_ZONE);
    const daysSinceReset = (nowInZone.weekday - RESET_WEEKDAY + 7) % 7;
    let boundary = nowInZone
      .minus({ days: daysSinceReset })
      .set({ hour: RESET_HOUR, minute: 0, second: 0, millisecond: 0 });
    if (boundary > nowInZone) boundary = boundary.minus({ weeks: 1 });
    return boundary;
  }

  window.handleIconError = function (img) {
    if (img.dataset.fallbackSrc) {
      img.src = img.dataset.fallbackSrc;
      delete img.dataset.fallbackSrc;
      return;
    }
    const span = document.createElement('span');
    span.className = 'avatar avatar-fallback';
    span.textContent = img.dataset.fallbackText || '??';
    img.replaceWith(span);
  };

  function classIconHtml(className) {
    if (!className) {
      return '<span class="avatar avatar-fallback">??</span>';
    }
    const safeName = className.replace(/[^a-zA-Z0-9_ -]/g, '');
    const fallback = safeName.slice(0, 2);
    return `<img class="avatar avatar-icon" src="assets/classes/${safeName}.svg" data-fallback-src="assets/classes/${safeName}.png" data-fallback-text="${fallback}" alt="${safeName}" onerror="handleIconError(this)" />`;
  }

  let cachedData = null;
  let hideThreeOfFour = true;
  let searchTerm = '';

  const EYE_SVG = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  const EYE_OFF_SVG = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.8 21.8 0 0 1 5.06-6.06M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.79 21.79 0 0 1-3.22 4.55M1 1l22 22"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/></svg>';

  function buildCharRow(char, raidsCleared) {
    const rowEl = document.createElement('div');
    rowEl.className = 'char-row';

    const nameEl = document.createElement('div');
    nameEl.className = 'char-name';
    nameEl.innerHTML = `
      ${classIconHtml(char.class_name)}
      <span class="name">${char.char_name}</span>
      <span class="ilvl">${char.item_level != null ? char.item_level.toFixed(2) : '?'}</span>
      <span class="region">NA</span>
      <span class="muted">${char.class_name || 'unknown class'}</span>
      <span class="muted">${raidsCleared.size}/${TRACKED_RAIDS.length} cleared</span>
    `;
    rowEl.appendChild(nameEl);

    const badgesEl = document.createElement('div');
    badgesEl.className = 'badges';
    for (const raidName of TRACKED_RAIDS) {
      const badge = document.createElement('span');
      badge.className = raidsCleared.has(raidName) ? 'badge badge-done' : 'badge badge-todo';
      badge.textContent = raidName;
      badgesEl.appendChild(badge);
    }
    rowEl.appendChild(badgesEl);

    return rowEl;
  }

  function isCompletionHidden(raidsCleared) {
    if (raidsCleared.size === TRACKED_RAIDS.length) return true; // 4/4 — always hidden
    if (raidsCleared.size === TRACKED_RAIDS.length - 1 && hideThreeOfFour) return true; // 3/4 — toggle-controlled
    return false;
  }

  function renderRosterCard(root, personName, chars, visibleChars, clearsByCharId, { showHiddenCount }) {
    const rosterEl = document.createElement('div');
    rosterEl.className = 'roster';

    let countsText = `${chars.length} chars`;
    if (showHiddenCount) {
      let hiddenCount = 0;
      let completeCount = 0;
      for (const char of chars) {
        const raidsCleared = clearsByCharId.get(char.id) || new Set();
        if (raidsCleared.size === TRACKED_RAIDS.length) completeCount++;
        else if (raidsCleared.size === TRACKED_RAIDS.length - 1 && hideThreeOfFour) hiddenCount++;
      }
      if (hiddenCount > 0) countsText += `, ${hiddenCount} hidden`;
      if (completeCount > 0) countsText += `, ${completeCount} complete`;
    }
    const headerEl = document.createElement('div');
    headerEl.className = 'roster-header';
    headerEl.innerHTML = `<span>${personName}'s roster</span><span class="muted">(${countsText})</span>`;
    rosterEl.appendChild(headerEl);

    const bodyEl = document.createElement('div');
    bodyEl.className = 'roster-body';

    for (const char of visibleChars) {
      const raidsCleared = clearsByCharId.get(char.id) || new Set();
      bodyEl.appendChild(buildCharRow(char, raidsCleared));
    }

    rosterEl.appendChild(bodyEl);
    root.appendChild(rosterEl);

    if (visibleChars.length > VISIBLE_ROWS) {
      const rows = bodyEl.querySelectorAll('.char-row');
      const cutoffRow = rows[VISIBLE_ROWS - 1];
      bodyEl.style.maxHeight = `${cutoffRow.offsetTop + cutoffRow.offsetHeight}px`;
      bodyEl.style.overflowY = 'auto';
    }
  }

  function renderDashboard() {
    const root = document.getElementById('root');
    if (!cachedData) return;
    const { byPerson, clearsByCharId } = cachedData;

    root.innerHTML = '';

    if (byPerson.size === 0) {
      root.innerHTML = '<p class="muted">No resolved characters yet.</p>';
      return;
    }

    const term = searchTerm.trim().toLowerCase();
    let renderedAnything = false;

    for (const [personName, chars] of byPerson) {
      const personMatches = !term || personName.toLowerCase().includes(term);

      if (personMatches) {
        const visibleChars = chars.filter((char) => !isCompletionHidden(clearsByCharId.get(char.id) || new Set()));
        renderedAnything = true;
        renderRosterCard(root, personName, chars, visibleChars, clearsByCharId, { showHiddenCount: true });
        continue;
      }

      // Person name didn't match — fall back to matching individual character names.
      // Explicit character search always shows the result, ignoring the completion toggle.
      const matchingChars = chars.filter((char) => char.char_name.toLowerCase().includes(term));
      if (matchingChars.length === 0) continue;

      renderedAnything = true;
      renderRosterCard(root, personName, matchingChars, matchingChars, clearsByCharId, { showHiddenCount: false });
    }

    if (!renderedAnything) {
      root.innerHTML = '<p class="muted">No matches.</p>';
    }
  }

  async function main() {
    const root = document.getElementById('root');

    if (SUPABASE_ANON_KEY.startsWith('PASTE_')) {
      root.innerHTML = '<p class="error">Set SUPABASE_ANON_KEY in index.html before loading this page.</p>';
      return;
    }

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const weekStart = getCurrentWeekStart();
    const weekStartDate = weekStart.toISODate();

    document.getElementById('week-label').textContent = `week of ${weekStartDate}`;

    const [{ data: characters, error: charErr }, { data: clears, error: clearErr }] = await Promise.all([
      supabase.from('characters').select('id, person_name, char_name, class_name, item_level').eq('resolve_status', 'ok'),
      supabase.from('clears').select('character_id, raid_name').eq('week_start', weekStartDate),
    ]);

    if (charErr || clearErr) {
      root.innerHTML = `<p class="error">Failed to load data: ${(charErr || clearErr).message}</p>`;
      return;
    }

    const clearsByCharId = new Map();
    for (const clear of clears) {
      if (!clearsByCharId.has(clear.character_id)) clearsByCharId.set(clear.character_id, new Set());
      clearsByCharId.get(clear.character_id).add(clear.raid_name);
    }

    const byPerson = new Map();
    for (const char of characters) {
      if (!byPerson.has(char.person_name)) byPerson.set(char.person_name, []);
      byPerson.get(char.person_name).push(char);
    }
    for (const chars of byPerson.values()) {
      chars.sort((a, b) => (b.item_level ?? 0) - (a.item_level ?? 0));
    }

    cachedData = { byPerson, clearsByCharId };
    renderDashboard();
  }

  function setupControls() {
    const toggleBtn = document.getElementById('hide-toggle');
    const searchInput = document.getElementById('search-input');

    function updateToggleLabel() {
      const label = hideThreeOfFour ? 'Show 3/4 cleared characters' : 'Hide 3/4 cleared characters';
      toggleBtn.innerHTML = hideThreeOfFour ? EYE_OFF_SVG : EYE_SVG;
      toggleBtn.title = label;
      toggleBtn.setAttribute('aria-label', label);
    }

    updateToggleLabel();
    toggleBtn.addEventListener('click', () => {
      hideThreeOfFour = !hideThreeOfFour;
      updateToggleLabel();
      renderDashboard();
    });

    searchInput.addEventListener('input', () => {
      searchTerm = searchInput.value;
      renderDashboard();
    });
  }

  main();
  setupControls();
</script>
<style>
  :root {
    color-scheme: dark;
  }
  body {
    margin: 0;
    background: #0d0d0f;
    color: #e8e8ea;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem 1.25rem;
  }
  .page-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .page-header h1 {
    font-size: 18px;
    font-weight: 500;
    margin: 0;
  }
  .page-header-controls {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 1.25rem;
  }
  #search-input {
    flex: 1;
    background: #17171a;
    border: 0.5px solid #2a2a2e;
    border-radius: 8px;
    color: #e8e8ea;
    padding: 8px 12px;
    font-size: 14px;
  }
  .toggle-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #17171a;
    color: #c9c9cf;
    border: 0.5px solid #2a2a2e;
    border-radius: 8px;
    width: 38px;
    height: 38px;
    flex-shrink: 0;
    cursor: pointer;
  }
  .toggle-btn:hover {
    background: #1e1e22;
  }
  .muted {
    color: #8a8a8f;
    font-size: 13px;
  }
  .error {
    color: #e07a7a;
  }
  #root {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 1rem;
    align-items: start;
  }
  @media (max-width: 1100px) {
    #root {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }
  @media (max-width: 700px) {
    #root {
      grid-template-columns: 1fr;
    }
  }
  .roster {
    border: 0.5px solid #2a2a2e;
    border-radius: 12px;
    overflow: hidden;
  }
  .roster-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    background: #17171a;
    border-bottom: 0.5px solid #2a2a2e;
    font-weight: 500;
    font-size: 14px;
  }
  .roster-body {
    scrollbar-width: thin;
  }
  .char-row {
    padding: 14px 16px;
    border-bottom: 0.5px solid #2a2a2e;
  }
  .char-row:last-child {
    border-bottom: none;
  }
  .char-name {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    font-size: 14px;
  }
  .char-name .name {
    font-weight: 500;
  }
  .ilvl {
    font-size: 13px;
    color: #d8a34a;
  }
  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    flex-shrink: 0;
  }
  .avatar-icon {
    object-fit: contain;
    background: #1e2a3a;
    padding: 3px;
  }
  .avatar-fallback {
    background: #1e2a3a;
    color: #7fb2e8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 500;
  }
  .region {
    font-size: 12px;
    color: #8a8a8f;
    border: 0.5px solid #2a2a2e;
    border-radius: 4px;
    padding: 1px 6px;
  }
  .badges {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .badge {
    display: flex;
    align-items: center;
    gap: 6px;
    border: 0.5px solid #2a2a2e;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
  }
  .badge-done::before {
    content: '\2713';
    color: #5dcaa5;
  }
  .badge-todo {
    opacity: 0.5;
  }
  .badge-todo::before {
    content: '\2715';
    color: #8a8a8f;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1>Raid clear tracker</h1>
      <div class="page-header-controls">
        <span id="week-label" class="muted"></span>
      </div>
    </div>

    <div class="toolbar">
      <input id="search-input" type="text" placeholder="Search a roster or character..." />
      <button id="hide-toggle" class="toggle-btn"></button>
    </div>

    <div id="root"><p class="muted">Loading...</p></div>
  </div>
</body>
</html>
